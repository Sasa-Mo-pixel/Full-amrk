<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BMI Calculator - NurseH+</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
  .bmi-container { background: #1e293b; padding: 30px; border-radius: 15px; width: 100%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); margin-top: 20px; }
  .input-group { margin-bottom: 20px; }
  .input-group label { display: block; margin-bottom: 8px; color: #38bdf8; font-weight: 600; font-family: 'Inter'; }
  .input-group input { width: 100%; padding: 12px; border-radius: 8px; background: #020617; border: 1px solid #334155; color: white; font-size: 16px; outline: none; }
  .calc-btn { width: 100%; background: #38bdf8; color: #020617; padding: 12px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; font-family: 'Inter'; }
  .calc-btn:hover { background: #0284c7; color: white; }
  .result-box { margin-top: 25px; padding: 15px; background: #020617; border-radius: 8px; text-align: center; display: none; }
  .result-box h2 { color: #10b981; margin-bottom: 5px; font-size: 28px; }
  .result-box p { color: #cbd5e1; font-size: 16px; }
</style>
</head>
<body>

<div class="sidebar">
  <h2><i class="fa-solid fa-heart-pulse"></i> NurseH+</h2>
  <ul>
    <li onclick="location.href='index.html'"><i class="fa-solid fa-house"></i> Home</li>
    <li onclick="location.href='calculator.html'"><i class="fa-solid fa-calculator"></i> Calculator</li>
    <li class="active" onclick="location.href='bmi.html'"><i class="fa-solid fa-weight-scale"></i> BMI Calculator</li>
  </ul>
</div>

<div class="main">
  <h1><i class="fa-solid fa-weight-scale"></i> BMI Calculator</h1>
  
  <div class="bmi-container">
    <div class="input-group">
      <label>Weight (kg)</label>
      <input type="number" id="weight" placeholder="e.g. 70">
    </div>
    <div class="input-group">
      <label>Height (cm)</label>
      <input type="number" id="height" placeholder="e.g. 175">
    </div>
    <button class="calc-btn" onclick="calculateBMI()">Calculate BMI</button>

    <div class="result-box" id="result-box">
      <h2 id="bmi-value">22.5</h2>
      <p id="bmi-category">Normal weight</p>
    </div>
  </div>
</div>

<script>
  function calculateBMI() {
    let weight = document.getElementById('weight').value;
    let height = document.getElementById('height').value;
    let resultBox = document.getElementById('result-box');
    let bmiValue = document.getElementById('bmi-value');
    let bmiCategory = document.getElementById('bmi-category');

    if (weight > 0 && height > 0) {
      // تحويل الطول من سم إلى متر
      let heightInMeters = height / 100;
      // حساب BMI
      let bmi = (weight / (heightInMeters * heightInMeters)).toFixed(1);
      
      bmiValue.innerText = bmi;
      resultBox.style.display = 'block';

      // تحديد الفئة
      if (bmi < 18.5) {
        bmiCategory.innerText = "Underweight (نحافة)";
        bmiValue.style.color = "#fbbf24"; // أصفر
      } else if (bmi >= 18.5 && bmi <= 24.9) {
        bmiCategory.innerText = "Normal weight (طبيعي)";
        bmiValue.style.color = "#10b981"; // أخضر
      } else if (bmi >= 25 && bmi <= 29.9) {
        bmiCategory.innerText = "Overweight (زيادة وزن)";
        bmiValue.style.color = "#f97316"; // برتقالي
      } else {
        bmiCategory.innerText = "Obese (سمنة)";
        bmiValue.style.color = "#ef4444"; // أحمر
      }
    } else {
      alert("Please enter valid weight and height.");
    }
  }
</script>
</body>
</html>
