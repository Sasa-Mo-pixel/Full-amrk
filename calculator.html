<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Calculator - NurseH+</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
  .calc-container { background: #1e293b; padding: 25px; border-radius: 15px; width: 320px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); margin-top: 20px; }
  .display { width: 100%; height: 60px; background: #020617; color: #38bdf8; text-align: right; font-size: 28px; padding: 10px; border: none; border-radius: 8px; margin-bottom: 15px; outline: none; font-family: 'Inter'; }
  .keys { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .btn { padding: 15px; font-size: 20px; border: none; border-radius: 8px; cursor: pointer; background: #334155; color: white; transition: 0.2s; font-family: 'Inter'; }
  .btn:hover { background: #475569; }
  .btn.operator { background: #38bdf8; color: #020617; font-weight: bold; }
  .btn.operator:hover { background: #0284c7; color: white; }
  .btn.equal { grid-column: span 2; background: #10b981; color: white; }
  .btn.equal:hover { background: #059669; }
  .btn.clear { grid-column: span 2; background: #ef4444; color: white; }
  .btn.clear:hover { background: #dc2626; }
</style>
</head>
<body>

<div class="sidebar">
  <h2><i class="fa-solid fa-heart-pulse"></i> NurseH+</h2>
  <ul>
    <li onclick="location.href='index.html'"><i class="fa-solid fa-house"></i> Home</li>
    <li class="active" onclick="location.href='calculator.html'"><i class="fa-solid fa-calculator"></i> Calculator</li>
    <li onclick="location.href='bmi.html'"><i class="fa-solid fa-weight-scale"></i> BMI Calculator</li>
  </ul>
</div>

<div class="main">
  <h1><i class="fa-solid fa-calculator"></i> Medical Calculator</h1>
  
  <div class="calc-container">
    <input type="text" class="display" id="display" disabled>
    <div class="keys">
      <button class="btn clear" onclick="clearDisplay()">C</button>
      <button class="btn operator" onclick="appendOperator('/')">/</button>
      <button class="btn operator" onclick="appendOperator('*')">*</button>
      
      <button class="btn" onclick="appendNumber('7')">7</button>
      <button class="btn" onclick="appendNumber('8')">8</button>
      <button class="btn" onclick="appendNumber('9')">9</button>
      <button class="btn operator" onclick="appendOperator('-')">-</button>
      
      <button class="btn" onclick="appendNumber('4')">4</button>
      <button class="btn" onclick="appendNumber('5')">5</button>
      <button class="btn" onclick="appendNumber('6')">6</button>
      <button class="btn operator" onclick="appendOperator('+')">+</button>
      
      <button class="btn" onclick="appendNumber('1')">1</button>
      <button class="btn" onclick="appendNumber('2')">2</button>
      <button class="btn" onclick="appendNumber('3')">3</button>
      <button class="btn" style="grid-row: span 2;" onclick="appendNumber('.')">.</button>

      <button class="btn" onclick="appendNumber('0')">0</button>
      <button class="btn equal" onclick="calculate()">=</button>
    </div>
  </div>
</div>

<script>
  let display = document.getElementById('display');
  function appendNumber(number) { display.value += number; }
  function appendOperator(operator) { display.value += ' ' + operator + ' '; }
  function clearDisplay() { display.value = ''; }
  function calculate() {
    try { display.value = eval(display.value); } 
    catch (e) { display.value = 'Error'; }
  }
</script>
</body>
</html>
